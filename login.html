<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="base.css">
    <title>eurolearn Login</title>
</head>
<body>
    
    <main class="container-fluid">

        <div class="row">
            <div class="col col-sm-12 col-md-12 col-lg-12">
                <h1 class="ps-5 pt-5 title-font">eurolearn</h1>
            </div>

            <div class="col col-sm-12 col-md-12 col-lg-12 d-flex justify-content-center align-items-center login-card-container">
                <div class="card card-login px-3 py-3">
                    <div class="card-body">
                        <h5 class="card-title title-font">Fazer login</h5>
                        <h6 class="card-subtitle subtitle-font mb-2 mt-3 text-body-secondary">Use suas credenciais para entrar na sua conta eurolearn</h6>
                        
                        <form action="" class="pt-3">
                            <div class="mb-3">
                                <label for="email" class="form-label ps-1">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                            <div class="mb-3">
                                <label for="senha" class="form-label ps-1">Senha</label>
                                <input type="password" class="form-control" id="senha">
                            </div>
                            <div class="mb-3">
                                <label for="cpf" class="form-label ps-1">CPF</label>
                                <input type="text" class="form-control" id="cpf">
                            </div>
                            <button type="submit" class="btn btn-login mt-2">Acessar eurolearn</button>
                        </form>
                    </div>
                </div>
            </div>

        <div class="col col-sm-12 col-md-12 col-lg-12 px-0 container-fluid">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#F1DF18" fill-opacity="1"
                    d="M0,64L60,53.3C120,43,240,21,360,58.7C480,96,600,192,720,208C840,224,960,160,1080,149.3C1200,139,1320,181,1380,202.7L1440,224L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z">
                </path>
            </svg>
        </div>

        <div class="col col-sm-12 col-md-12 col-lg-12 px-0" style="height: 10vh; background-color: #F1DF18">
        </div>

            

        </div>

    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
